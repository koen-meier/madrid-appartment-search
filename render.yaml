services:
  # Static dashboard — served at your Render URL
  - type: web
    name: madrid-dashboard
    env: static
    staticPublishPath: ./dashboard
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache

  # Scraper cron — runs every 4 hours
  - type: cron
    name: madrid-scraper
    env: python
    schedule: "0 */4 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_TO
        sync: false
      - key: APIFY_TOKEN
        sync: false
